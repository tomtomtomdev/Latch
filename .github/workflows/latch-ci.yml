name: Latch CI

on:
  push:
    paths:
      - "Latch/**"
      - "LatchKit/**"
      - "LatchTests/**"
      - "LatchUITests/**"
      - "Latch.xcodeproj/**"
      - ".github/workflows/latch-ci.yml"
      - ".swiftlint.yml"
  pull_request:

defaults:
  run:
    working-directory: .

jobs:
  package-tests:
    name: LatchKit unit tests (Domain + Data)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.1.app
      - name: swift test
        working-directory: LatchKit
        run: swift test

  app-build:
    name: Build app target
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.1.app
      - name: Build
        run: |
          xcodebuild \
            -project Latch.xcodeproj \
            -scheme Latch \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint (strict — warnings fail the build)
        run: swiftlint lint --strict
